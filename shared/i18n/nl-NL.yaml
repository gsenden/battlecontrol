CREDITS_INTRO: "Ik ben sinds de jaren 90 een grote fan van The Ur-Quan Masters gebleven, en het spel gaf mij en mijn vrienden onvergetelijke herinneringen. Samen op één toetsenbord was het de beste multiplayer ooit. BattleControl is een eerbetoon aan die ervaring."

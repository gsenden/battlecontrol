openapi: "3.1.0"
info:
  title: Matter-rs Game Server
  version: "0.1.0"
  description: Multiplayer game server API

paths:
  /auth/login:
    post:
      summary: Sign in an existing player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginUserRequest"
      responses:
        "200":
          description: Login successful
  /auth/me:
    get:
      summary: Get the current signed-in player
      responses:
        "200":
          description: Current user
        "401":
          description: No active session
  /auth/logout:
    post:
      summary: Sign out the current player
      responses:
        "204":
          description: Logout successful
  /auth/profile:
    put:
      summary: Save the current player's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileRequest"
      responses:
        "200":
          description: Profile saved
        "401":
          description: No active session
  /auth/profile-image:
    post:
      summary: Upload the current player's profile image
      responses:
        "200":
          description: Profile image uploaded
        "401":
          description: No active session
  /auth/settings:
    get:
      summary: Get the current player's settings
      responses:
        "200":
          description: Current user settings
        "401":
          description: No active session
    put:
      summary: Save the current player's settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
      responses:
        "200":
          description: Settings saved
        "401":
          description: No active session
  /auth/recovery-code:
    post:
      summary: Create a one-time recovery code for the current player
      responses:
        "200":
          description: Recovery code created
        "401":
          description: No active session
  /auth/recover:
    post:
      summary: Restore a player session from a recovery code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoverUserRequest"
      responses:
        "200":
          description: Player restored
  /auth/passkey/register/start:
    post:
      summary: Start passkey registration for a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyStartRegistrationRequest"
      responses:
        "200":
          description: Passkey registration options
  /auth/passkey/register/finish:
    post:
      summary: Finish passkey registration for a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyFinishRegistrationRequest"
      responses:
        "200":
          description: Passkey registration successful
  /auth/passkey/login/start:
    post:
      summary: Start passkey login for an existing player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyStartLoginRequest"
      responses:
        "200":
          description: Passkey login options
  /auth/passkey/login/finish:
    post:
      summary: Finish passkey login for an existing player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyFinishLoginRequest"
      responses:
        "200":
          description: Passkey login successful
  /auth/user:
    post:
      summary: Register a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: Registration successful

components:
  schemas:
    LoginUserRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    CreateUserRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    PasskeyStartRegistrationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    PasskeyFinishRegistrationRequest:
      type: object
      required:
        - name
        - credential
      properties:
        name:
          type: string
        credential:
          type: object
    PasskeyStartLoginRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    PasskeyFinishLoginRequest:
      type: object
      required:
        - name
        - credential
      properties:
        name:
          type: string
        credential:
          type: object
    UpdateUserProfileRequest:
      type: object
      required:
        - name
        - profile_image_url
      properties:
        name:
          type: string
        profile_image_url:
          type: string
    ProfileImageUpload:
      type: object
      required:
        - profile_image_url
      properties:
        profile_image_url:
          type: string
    UserSettings:
      type: object
      required:
        - turn_left_key
        - turn_right_key
        - thrust_key
        - music_enabled
        - music_volume
        - sound_effects_enabled
        - sound_effects_volume
      properties:
        turn_left_key:
          type: string
        turn_right_key:
          type: string
        thrust_key:
          type: string
        music_enabled:
          type: boolean
        music_volume:
          type: integer
        sound_effects_enabled:
          type: boolean
        sound_effects_volume:
          type: integer
    RecoverUserRequest:
      type: object
      required:
        - recovery_code
      properties:
        recovery_code:
          type: string
    RecoveryCode:
      type: object
      required:
        - recovery_code
        - expires_at
      properties:
        recovery_code:
          type: string
        expires_at:
          type: integer

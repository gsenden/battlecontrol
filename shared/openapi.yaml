openapi: "3.1.0"
info:
  title: Matter-rs Game Server
  version: "0.1.0"
  description: Multiplayer game server API

paths:
  /auth/login:
    post:
      summary: Sign in an existing player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginUserRequest"
      responses:
        "200":
          description: Login successful
  /auth/me:
    get:
      summary: Get the current signed-in player
      responses:
        "200":
          description: Current user
        "401":
          description: No active session
  /auth/logout:
    post:
      summary: Sign out the current player
      responses:
        "204":
          description: Logout successful
  /auth/passkey/register/start:
    post:
      summary: Start passkey registration for a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyStartRegistrationRequest"
      responses:
        "200":
          description: Passkey registration options
  /auth/passkey/register/finish:
    post:
      summary: Finish passkey registration for a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyFinishRegistrationRequest"
      responses:
        "200":
          description: Passkey registration successful
  /auth/passkey/login/start:
    post:
      summary: Start passkey login for an existing player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyStartLoginRequest"
      responses:
        "200":
          description: Passkey login options
  /auth/passkey/login/finish:
    post:
      summary: Finish passkey login for an existing player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyFinishLoginRequest"
      responses:
        "200":
          description: Passkey login successful
  /auth/user:
    post:
      summary: Register a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: Registration successful

components:
  schemas:
    LoginUserRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    CreateUserRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    PasskeyStartRegistrationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    PasskeyFinishRegistrationRequest:
      type: object
      required:
        - name
        - credential
      properties:
        name:
          type: string
        credential:
          type: object
    PasskeyStartLoginRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    PasskeyFinishLoginRequest:
      type: object
      required:
        - name
        - credential
      properties:
        name:
          type: string
        credential:
          type: object
